# ========================
# Spring Config Import
# ========================
# Import local credentials/secrets (ignored by Git)
spring.config.import=optional:classpath:application-local.properties

# ========================
# MongoDB Configuration
# ========================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/meetnow_db}

# ========================
# Server Configuration
# ========================
server.port=8080
server.servlet.context-path=/api/v1.0

# ========================
# JWT Configuration
# ========================
jwt.secret.key=${JWT_SECRET_KEY:default-secret-key-please-change-in-production-use-long-key-32-chars-or-more}

# ========================
# Agora RTC Credentials
# ========================
agora.app.id=${AGORA_APP_ID:}
agora.app.certificate=${AGORA_APP_CERTIFICATE:}
